<svg xmlns="http://www.w3.org/2000/svg" width="253" height="80" viewBox="0 0 253 80">
  <!-- Icon: filled rounded square -->
  <rect x="0" y="4" width="72" height="72" rx="16" fill="#000000"/>
  <!-- N strokes -->
  <line x1="18" y1="62" x2="18" y2="18" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
  <line x1="18" y1="18" x2="54" y2="62" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
  <line x1="54" y1="62" x2="54" y2="18" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
  <!-- Neural endpoint dots -->
  <circle cx="18" cy="18" r="4.5" fill="#ffffff"/>
  <circle cx="54" cy="18" r="4.5" fill="#ffffff"/>
  <circle cx="18" cy="62" r="4.5" fill="#ffffff"/>
  <circle cx="54" cy="62" r="4.5" fill="#ffffff"/>
  <!-- Center midpoint dot -->
  <circle cx="36" cy="40" r="3.5" fill="#ffffff" opacity="0.6"/>
  <!-- Wordmark -->
  <text x="90" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="500" fill="#000000" letter-spacing="-0.5">NeuroLearn</text>
  <text x="91" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#888888" letter-spacing="4">AI</text>
</svg>